REGLAS PARA EL OBJETIVO DE CLASE (usa Taxonomía de Bloom):
- Un objetivo bien redactado SIEMPRE integra estos cuatro componentes en una sola frase: (1) un verbo de acción observable, (2) el contenido o tema específico de la clase, (3) la condición o contexto en que el estudiante lo demuestra, y (4) el criterio o nivel de logro esperado.

REGLAS PARA LA COMPETENCIA:
- Toda competencia tiene tres dimensiones igual de importantes: Saber (conocimiento conceptual), Saber hacer (habilidad/aplicación) y Saber ser (actitud o valor).

function renderInline(text) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) =>
    part.startsWith("**") && part.endsWith("**") ? (
      <strong key={i} className="text-white font-semibold">{part.slice(2, -2)}</strong>
    ) : (
      <span key={i}>{part}</span>
    )
  );
}

function isTableSeparatorLine(line) {
  return /^\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(line.trim());
}
function parseTableRow(line) {
  let t = line.trim();
  if (t.startsWith("|")) t = t.slice(1);
  if (t.endsWith("|")) t = t.slice(0, -1);
  return t.split("|").map((c) => c.trim());
}

function renderMD(text) {
  if (!text) return null;
  const lines = text.split("\n");
  const elements = [];
  let listItems = [];
  const flushList = (key) => {
    if (listItems.length) {
      elements.push(
        <ul key={`ul-${key}`} className="list-disc list-inside space-y-1 mb-3 ml-1 text-slate-200 text-sm">
          {listItems.map((item, idx) => <li key={idx}>{renderInline(item)}</li>)}
        </ul>
      );
      listItems = [];
    }
  };
  let i = 0;
  while (i < lines.length) {
    const raw = lines[i];
    const t = raw.trim();

    if (t.startsWith("|") && i + 1 < lines.length && isTableSeparatorLine(lines[i + 1])) {
      flushList(i);
      const headerCells = parseTableRow(t);
      const rows = [];
      let j = i + 2;
      while (j < lines.length && lines[j].trim().startsWith("|")) {
        rows.push(parseTableRow(lines[j]));
        j++;
      }
      elements.push(
        <div key={`table-${i}`} className="overflow-x-auto mb-3 rounded-lg border border-white/10">
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-slate-800">
                {headerCells.map((c, ci) => (
                  <th key={ci} className="border border-white/10 px-3 py-2 text-left font-semibold text-white">{renderInline(c)}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => (
                <tr key={ri} className={ri % 2 === 0 ? "bg-white/5" : "bg-transparent"}>
                  {row.map((c, ci) => (
                    <td key={ci} className="border border-white/10 px-3 py-2 text-slate-200">{renderInline(c)}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
      i = j;
      continue;
    }

    if (t.startsWith("### ")) {
      flushList(i);
      elements.push(<h3 key={i} className="text-sm font-bold text-amber-300 mt-4 mb-1 uppercase tracking-wide">{t.slice(4)}</h3>);
    } else if (t.startsWith("## ")) {
      flushList(i);
      elements.push(<h2 key={i} className="text-lg font-bold text-emerald-300 mt-5 mb-2 pb-1 border-b border-white/10">{t.slice(3)}</h2>);
    } else if (t.startsWith("- ")) {
      listItems.push(t.slice(2));
    } else if (t === "") {
      flushList(i);
    } else {
      flushList(i);
      elements.push(<p key={i} className="text-sm text-slate-200 mb-2 leading-relaxed">{renderInline(t)}</p>);
    }
    i++;
  }
  flushList("end");
  return elements;
}

/* ---- Conversión a HTML compatible con Word, usada solo al copiar ---- */
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function inlineToWordHtml(text) {
  return escapeHtml(text).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
}
function mdToWordHtml(text) {
  if (!text) return "";
  const lines = text.split("\n");
  let html = "";
  let listItems = [];
  let i = 0;
  const flushList = () => {
    if (listItems.length) {
      html += `<ul>${listItems.map((it) => `<li>${inlineToWordHtml(it)}</li>`).join("")}</ul>`;
      listItems = [];
    }
  };
  while (i < lines.length) {
    const raw = lines[i];
    const t = raw.trim();
    if (t.startsWith("|") && i + 1 < lines.length && isTableSeparatorLine(lines[i + 1])) {
      flushList();
      const headerCells = parseTableRow(t);
      let tableHtml = `<table style="width:100%;border-collapse:collapse;margin:8px 0;">`;
      tableHtml += `<tr>${headerCells.map((c) => `<th style="border:1px solid #999;padding:6px 8px;background:#e5e7eb;text-align:left;">${inlineToWordHtml(c)}</th>`).join("")}</tr>`;
      let j = i + 2;
      while (j < lines.length && lines[j].trim().startsWith("|")) {
        const rowCells = parseTableRow(lines[j]);
        tableHtml += `<tr>${rowCells.map((c) => `<td style="border:1px solid #999;padding:6px 8px;">${inlineToWordHtml(c)}</td>`).join("")}</tr>`;
        j++;
      }
      tableHtml += `</table>`;
      html += tableHtml;
      i = j;
      continue;
    }
    if (t.startsWith("### ")) {
      flushList();
      html += `<h4 style="margin:12px 0 4px;">${inlineToWordHtml(t.slice(4))}</h4>`;
    } else if (t.startsWith("## ")) {
      flushList();
      html += `<h3 style="margin:16px 0 6px;">${inlineToWordHtml(t.slice(3))}</h3>`;
    } else if (t.startsWith("- ")) {
      listItems.push(t.slice(2));
    } else if (t === "") {
      flushList();
    } else {
      flushList();
      html += `<p style="margin:0 0 8px;">${inlineToWordHtml(t)}</p>`;
    }
    i++;
  }
  flushList();
  return html;
}

function PlaneacionGenerator() {
  const [asignatura, setAsignatura] = useState("");
  const [grado, setGrado] = useState("");
  const [horasSemana, setHorasSemana] = useState(1);
  const [duracion, setDuracion] = useState(60);
  const [temas, setTemas] = useState([{ nucleo: "", subtemaValue: "", custom: "", recursos: "", pagina: null }]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [planes, setPlanes] = useState([]);
  const [copiedIndex, setCopiedIndex] = useState(null);

  const modulosDisponibles = asignatura && grado ? (CONTENIDOS[asignatura]?.[grado] || []) : [];
  const numSesiones = Math.min(Math.max(parseInt(horasSemana, 10) || 0, 0), 10);

  const diaVacio = () => ({ nucleo: "", subtemaValue: "", custom: "", recursos: "", pagina: null });

  const resizeTemas = (n) => {
    setTemas((prev) => {
      const arr = [...prev];
      while (arr.length < n) arr.push(diaVacio());
      arr.length = Math.max(n, 0);
      return arr;
    });
  };

  const handleAsignaturaChange = (val) => {
    setAsignatura(val);
    setGrado("");
    resizeTemas(numSesiones);
    setTemas((prev) => prev.map(() => diaVacio()));
    setPlanes([]); setError("");
  };
  const handleGradoChange = (val) => {
    setGrado(val);
    setTemas((prev) => prev.map(() => diaVacio()));
    setPlanes([]); setError("");
  };
  const handleHorasChange = (val) => {
    setHorasSemana(val);
    const n = Math.min(Math.max(parseInt(val, 10) || 0, 0), 10);
    resizeTemas(n);
    setPlanes([]); setError("");
  };
  const updateField = (i, field, val) => {
    setTemas((prev) => prev.map((t, idx) => (idx === i ? { ...t, [field]: val } : t)));
  };
  const updateNucleo = (i, val) => {
    setTemas((prev) => prev.map((t, idx) => (idx === i ? { ...t, nucleo: val, subtemaValue: "", custom: "", pagina: null } : t)));
  };
  const updateSubtema = (i, val, paginaVal) => {
    setTemas((prev) => prev.map((t, idx) => (idx === i ? { ...t, subtemaValue: val, custom: "", pagina: val === OTRO ? null : paginaVal } : t)));
  };

  const temasCompletos = numSesiones > 0 && temas.slice(0, numSesiones).every(
    (t) => t.nucleo && ((t.subtemaValue && t.subtemaValue !== OTRO) || (t.subtemaValue === OTRO && t.custom.trim()))
  );
  const puedeGenerar = asignatura && grado && numSesiones > 0 && Number(duracion) > 0 && temasCompletos && !loading;

  const callDia = async (i, temaFinal, recursosDia) => {
    const userPrompt = `Construye la planeación de clase para el Día ${i + 1} de ${numSesiones} sesiones semanales de esta asignatura.
- Asignatura: ${asignatura}
- Grado: ${grado}°
- Tema específico de esta clase: ${temaFinal}
- Duración de esta clase: ${duracion} minutos (definida libremente por el docente)
- Horas semanales totales dedicadas a esta asignatura: ${horasSemana} (definidas libremente por el docente)
- Recursos que el docente planea utilizar específicamente en esta clase (úsalos como contexto si aplica, no los listes en sección aparte): ${recursosDia || "el libro de texto y el tablero"}`;

    const response = await fetch("/api/generar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ systemPrompt: SYSTEM_PROMPT, userPrompt }),
    });
    if (!response.ok) throw new Error("network");
    const data = await response.json();
    const text = (data.text || "").trim();
    if (!text) throw new Error("empty");
    return text;
  };

  const construirTemaYRecursos = (t) => {
    const subtemaFinal = t.subtemaValue === OTRO ? t.custom : t.subtemaValue;
    const temaFinal = t.nucleo ? `${t.nucleo}: ${subtemaFinal}` : subtemaFinal;
    const paginaNota = t.pagina ? `Página de trabajo en el recurso (ibook/libro): ${t.pagina}.` : "";
    const recursosFinal = [t.recursos.trim(), paginaNota].filter(Boolean).join(" ");
    return { temaFinal, recursosFinal };
  };

  const handleGenerate = async () => {
    setLoading(true); setError(""); setPlanes([]); setCopiedIndex(null);
    const total = numSesiones;
    const diasSnapshot = temas.slice(0, total).map((t) => ({ ...t, ...construirTemaYRecursos(t) }));
    const results = await Promise.allSettled(
      diasSnapshot.map((d, i) => callDia(i, d.temaFinal, d.recursosFinal))
    );
    const newPlanes = results.map((r, i) => {
      const d = diasSnapshot[i];
      return r.status === "fulfilled"
        ? { dia: i + 1, tema: d.temaFinal, recursos: d.recursosFinal, content: r.value }
        : { dia: i + 1, tema: d.temaFinal, recursos: d.recursosFinal, error: true };
    });
    setPlanes(newPlanes);
    if (results.some((r) => r.status === "rejected")) {
      setError("Una o más planeaciones no se pudieron generar. Usa 'Reintentar' en esa tarjeta.");
    }
    setLoading(false);
  };

  const handleRetryDia = async (i) => {
    setPlanes((prev) => prev.map((p, idx) => (idx === i ? { ...p, retrying: true } : p)));
    const temaFinal = planes[i].tema;
    const recursosFinal = planes[i].recursos;
    try {
      const content = await callDia(i, temaFinal, recursosFinal);
      setPlanes((prev) => prev.map((p, idx) => (idx === i ? { dia: i + 1, tema: temaFinal, recursos: recursosFinal, content } : p)));
    } catch {
      setPlanes((prev) => prev.map((p, idx) => (idx === i ? { dia: i + 1, tema: temaFinal, recursos: recursosFinal, error: true } : p)));
    }
  };

  const handleCopyDia = async (i) => {
    const p = planes[i];
    const recursosTexto = p.recursos || "No se especificaron recursos adicionales; se sugiere el libro de texto y el tablero.";
    const fullMarkdown = `${p.content}\n\n## Recursos sugeridos por el docente\n${recursosTexto}`;
    const fullHtml =
      mdToWordHtml(p.content) +
      `<h3 style="margin:16px 0 6px;">Recursos sugeridos por el docente</h3><p style="margin:0;">${inlineToWordHtml(recursosTexto)}</p>`;
    try {
      if (navigator.clipboard && window.ClipboardItem) {
        const item = new ClipboardItem({
          "text/plain": new Blob([fullMarkdown], { type: "text/plain" }),
          "text/html": new Blob([fullHtml], { type: "text/html" }),
        });
        await navigator.clipboard.write([item]);
      } else {
        await navigator.clipboard.writeText(fullMarkdown);
      }
      setCopiedIndex(i);
      setTimeout(() => setCopiedIndex(null), 2000);
    } catch {
      setError("No se pudo copiar automáticamente. Selecciona y copia el texto manualmente.");
    }
  };

  const handleLimpiar = () => {
    setAsignatura("");
    setGrado("");
    setHorasSemana(1);
    setDuracion(60);
    setTemas([diaVacio()]);
    setPlanes([]); setError(""); setCopiedIndex(null);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-slate-950 text-white p-4 sm:p-6">
      <div className="max-w-2xl mx-auto">
        <div className="flex items-center gap-3 mb-1">
          <div className="bg-gradient-to-br from-amber-400 to-orange-500 rounded-xl p-2 shadow-lg shadow-orange-500/20">
            <Sparkles className="w-5 h-5 text-white" />
          </div>
          <h1 className="text-xl sm:text-2xl font-bold">Generador de Planeaciones</h1>
        </div>
        <p className="text-slate-400 text-sm mb-6 ml-1">Santillana Compartir · Metodología activa · Taxonomía de Bloom · Evaluación en Pleno</p>

        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 sm:p-5 space-y-4 backdrop-blur-sm">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-medium text-slate-300 mb-1 block">1. Asignatura</label>
              <select
                value={asignatura}
                onChange={(e) => handleAsignaturaChange(e.target.value)}
                className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
              >
                <option value="">Selecciona</option>
                {Object.keys(CONTENIDOS).map((a) => <option key={a} value={a}>{a}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-medium text-slate-300 mb-1 block">2. Grado</label>
              <select
                value={grado}
                onChange={(e) => handleGradoChange(e.target.value)}
                disabled={!asignatura}
                className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 disabled:opacity-40"
              >
                <option value="">Selecciona</option>
                {asignatura && CONTENIDOS[asignatura] && Object.keys(CONTENIDOS[asignatura]).map((g) => <option key={g} value={g}>{g}°</option>)}
              </select>
            </div>
          </div>

          {asignatura && grado && (
            <>
              <div className="grid grid-cols-2 gap-3 pt-2 border-t border-white/10">
                <div>
                  <label className="text-xs font-medium text-slate-300 mb-1 block flex items-center gap-1">
                    <Clock className="w-3.5 h-3.5" /> 3. Horas/semana (tú decides)
                  </label>
                  <input
                    type="number"
                    min="1"
                    max="10"
                    value={horasSemana}
                    onChange={(e) => handleHorasChange(e.target.value)}
                    className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
                  />
                </div>
                <div>
                  <label className="text-xs font-medium text-slate-300 mb-1 block">4. Duración por clase (min, tú decides)</label>
                  <input
                    type="number"
                    min="10"
                    max="240"
                    step="5"
                    value={duracion}
                    onChange={(e) => setDuracion(e.target.value)}
                    className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
                  />
                </div>
              </div>
              <p className="text-xs text-slate-500 -mt-2">Se generará una planeación por cada hora semanal (máximo 10 por solicitud).</p>

              {numSesiones > 0 && (
                <div className="space-y-3">
                  <p className="text-xs font-medium text-slate-300">5. Aprendizaje nuclear, subtema y recursos para cada clase</p>
                  {temas.slice(0, numSesiones).map((t, i) => {
                    const nucleoObj = modulosDisponibles.find((n) => n.nombre === t.nucleo);
                    return (
                      <div key={i} className="bg-slate-800/50 rounded-lg p-2.5 space-y-2">
                        <label className="text-xs text-emerald-300 font-semibold mb-1 block">Día {i + 1}</label>

                        <select
                          value={t.nucleo}
                          onChange={(e) => updateNucleo(i, e.target.value)}
                          className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
                        >
                          <option value="">Selecciona el aprendizaje nuclear</option>
                          {modulosDisponibles.map((n) => <option key={n.nombre} value={n.nombre}>{n.nombre}</option>)}
                        </select>

                        {nucleoObj?.dba && (
                          <p className="text-xs text-slate-500 flex items-center gap-1">
                            <BookOpen className="w-3 h-3" /> {nucleoObj.dba}
                          </p>
                        )}

                        {t.nucleo && (
                          <select
                            value={t.subtemaValue}
                            onChange={(e) => {
                              const val = e.target.value;
                              const found = nucleoObj?.subtemas.find((s) => s.nombre === val);
                              updateSubtema(i, val, found ? found.pagina : null);
                            }}
                            className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400"
                          >
                            <option value="">Selecciona el subtema</option>
                            {(nucleoObj?.subtemas || []).map((s, si) => (
                              <option key={`${s.nombre}-${si}`} value={s.nombre}>
                                {s.nombre}{s.pagina ? ` (pág. ${s.pagina})` : ""}
                              </option>
                            ))}
                            <option value={OTRO}>Otro subtema (escribir)</option>
                          </select>
                        )}

                        {t.subtemaValue === OTRO && (
                          <input
                            type="text"
                            value={t.custom}
                            onChange={(e) => updateField(i, "custom", e.target.value)}
                            placeholder="Escribe el subtema específico de esta clase"
                            className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 placeholder:text-slate-500"
                          />
                        )}

                        {t.nucleo && (
                          <div>
                            <label className="text-xs font-medium text-slate-400 mb-1 block flex items-center gap-1">
                              <Wrench className="w-3.5 h-3.5" /> Recursos para este día
                            </label>
                            <textarea
                              value={t.recursos}
                              onChange={(e) => updateField(i, "recursos", e.target.value)}
                              placeholder="Ej: ibook, video corto, material concreto, guía impresa, plataforma Pleno..."
                              rows={2}
                              className="w-full bg-slate-800 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 placeholder:text-slate-500 resize-none"
                            />
                            {t.pagina && (
                              <p className="text-xs text-slate-500 mt-1">Página {t.pagina} se incluirá automáticamente en los recursos.</p>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          <div className="flex gap-2 pt-1">
            <button
              onClick={handleGenerate}
              disabled={!puedeGenerar}
              className="flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-emerald-500/20"
            >
              {loading ? (
                <><Loader2 className="w-4 h-4 animate-spin" /> Generando {numSesiones > 1 ? `${numSesiones} planeaciones` : "planeación"}...</>
              ) : (
                <><Sparkles className="w-4 h-4" /> Generar {numSesiones > 1 ? `${numSesiones} planeaciones` : "planeación"}</>
              )}
            </button>
            <button
              onClick={handleLimpiar}
              className="bg-white/10 hover:bg-white/20 text-white font-medium px-4 rounded-xl flex items-center justify-center gap-1.5 transition text-sm"
            >
              <RotateCcw className="w-4 h-4" /> Limpiar
            </button>
          </div>
        </div>

        {error && (
          <div className="mt-4 bg-red-500/10 border border-red-400/30 rounded-xl p-3 flex items-start gap-2 text-sm text-red-300">
            <AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0" />
            <span>{error}</span>
          </div>
        )}

        {planes.map((p, i) => (
          <div key={i} className="mt-5 bg-white/5 border border-white/10 rounded-2xl p-4 sm:p-5 backdrop-blur-sm">
            <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
              <span className="text-sm font-bold text-white bg-emerald-500/20 border border-emerald-400/30 rounded-full px-3 py-1">
                Día {p.dia} {p.tema ? `— ${p.tema}` : ""}
              </span>
              {!p.error && !p.retrying && (
                <button onClick={() => handleCopyDia(i)} className="flex items-center gap-1 text-xs bg-white/10 hover:bg-white/20 rounded-lg px-2.5 py-1.5 transition">
                  {copiedIndex === i ? <Check className="w-3.5 h-3.5 text-emerald-400" /> : <Copy className="w-3.5 h-3.5" />}
                  {copiedIndex === i ? "Copiado" : "Copiar"}
                </button>
              )}
            </div>

            {p.retrying && (
              <div className="flex items-center gap-2 text-sm text-slate-400 py-4">
                <Loader2 className="w-4 h-4 animate-spin" /> Reintentando...
              </div>
            )}

            {p.error && !p.retrying && (
              <div className="flex items-center justify-between bg-red-500/10 border border-red-400/30 rounded-lg p-3">
                <span className="text-sm text-red-300">No se pudo generar esta planeación.</span>
                <button onClick={() => handleRetryDia(i)} className="flex items-center gap-1 text-xs bg-white/10 hover:bg-white/20 rounded-lg px-2.5 py-1.5 transition">
                  <RefreshCw className="w-3.5 h-3.5" /> Reintentar
                </button>
              </div>
            )}

            {!p.error && !p.retrying && (
              <>
                <div>{renderMD(p.content)}</div>
                <div className="mt-3 pt-3 border-t border-white/10">
                  <h2 className="text-lg font-bold text-emerald-300 mb-2">Recursos sugeridos por el docente</h2>
                  <p className="text-sm text-slate-200 leading-relaxed">
                    {p.recursos || "No se especificaron recursos adicionales; se sugiere el libro de texto y el tablero."}
                  </p>
                </div>
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PlaneacionGenerator />);
</script>
</body>
</html>
